
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pockii - Quản lí nợ thông minh</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;700&family=Cherry+Bomb+One&family=Coiny&family=Roboto+Serif:wght@400&family=Roboto+Slab:wght@400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="main-header">
        <a href="Home.html" class="logo">Pockii</a>
        <nav class="nav-menu">
            <div class="nav-item">
                <a href="#">Tính năng</a>
                </div>
            <div class="nav-item">
                <a href="#">Minigame</a>
                </div>
            <div class="nav-item"><a href="#">Gói</a></div>
            <div class="nav-item"><a href="news.html">Đọc báo</a></div>
            <div class="nav-item"><a href="#">Giới thiệu</a></div>
        </nav>
        <div class="auth-buttons">
            <a href="signup.html" class="btn btn-register">Đăng ký</a>
            <a href="login.html" class="btn btn-login">Đăng nhập</a>
        </div>
    </header>

    <main class="debt-page">

        <h1 class="page-title">Quản lí nợ thông minh</h1>

        <section class="debt-form-section">
            
            <div class="main-type-select">
                <select id="mainType">
                    <option value="hoadon">Hóa đơn</option>
                    <option value="no">Nợ</option>
                </select>
                <div class="custom-arrow">▼</div>
            </div>

            <form action="#" class="debt-form" novalidate>
                
                <div class="debt-input-group">
                    <label for="debt-name">Tên hóa đơn:</label>
                    <input type="text" id="debt-name" required>
                </div>

                <div class="debt-input-group">
                    <label for="debt-amount">Số tiền:</label>
                    <input type="text" id="debt-amount" required>
                </div>

                <div class="debt-input-row">
                    <div class="debt-input-group half-width">
                        <label for="debt-cycle">Chu kì:</label>
                        <div class="select-wrapper">
                            <select id="debt-cycle">
                                <option value="tuan">Tuần</option>
                                <option value="thang">Tháng</option>
                                <option value="nam">Năm</option>
                            </select>
                            <div class="custom-arrow">▼</div>
                        </div>
                    </div>

                    <div class="debt-input-group half-width">
                        <label for="debt-date">Ngày đến hạn:</label>
                        <div class="select-wrapper">
                            <select id="debt-date">
                                <option value="option1">Thứ 2, 3, 4, 5, 6, 7, CN</option>
                                <option value="option2">Ngày 1 - 31</option>
                                <option value="option3">Lịch năm</option>
                            </select>
                            <div class="custom-arrow">▼</div>
                        </div>
                    </div>
                </div>

                <div class="debt-input-row">
                    <div class="debt-input-group half-width">
                        <label for="debt-priority">Mức độ ưu tiên:</label>
                        <div class="select-wrapper">
                            <select id="debt-priority">
                                <option value="rat-cao">Rất cao</option>
                                <option value="cao">Cao</option>
                                <option value="trung-binh">Trung bình</option>
                                <option value="thap">Thấp</option>
                            </select>
                            <div class="custom-arrow">▼</div>
                        </div>
                    </div>
                </div>

            </form>
        </section>

        <section class="debt-list-section">
            <h2 class="list-title">Danh sách</h2>
            
            <nav class="list-tabs">
                <a href="#" class="active">Tất cả</a>
                <a href="#">Hóa đơn</a>
                <a href="#">Nợ</a>
            </nav>

            <div class="table-container">
                <table class="debt-table">
                    <thead>
                        <tr>
                            <th>STT</th>
                            <th>Loại</th>
                            <th>Tên</th>
                            <th>Số tiền</th>
                            <th>Mức độ ưu tiên</th>
                            <th>Ngày đến hạn</th>
                            <th>Số ngày đến hạn</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td></td>
                            <td></td>
                            <td></td>
                            <td></td>
                            <td></td>
                            <td></td>
                            <td></td>
                        </tr>
                    </tbody>
                </table>
            </div>

        </section>

    </main>

</body>
</html>
