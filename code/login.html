<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pockii - Đăng nhập</title>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="main-header">
        <a href="Home.html" class="logo">Pockii</a>
        <div class="auth-alt">
            <a href="signup.html" class="auth-text">Bạn chưa có tài khoản?</a>
            <a href="signup.html" class="btn btn-login-standalone">Đăng ký</a>
        </div>
    </header>

    <main class="signup-page">
        <div class="signup-box">
            <h1 class="signup-title">Chào mừng bạn đến với Pockii</h1>
            
            <div class="social-login">
                <button class="btn-social"><img src="google.png" alt="Google"></button>
                <button class="btn-social"><img src="facebook.png" alt="Facebook"></button>
            </div>

            <form action="#" class="login-form" novalidate>
                
                <div class="input-group">
                    <label>Email:</label>
                    <input type="email" id="login-email" required> 
                    <span id="login-email-error" class="error-message"></span>
                </div>

                <div class="input-group">
                    <label>Mật khẩu:</label>
                    <input type="password" id="login-password" required>
                    <span id="login-password-error" class="error-message"></span>
                </div>

                <div class="forgot-password">
                    <a href="#">Quên mật khẩu?</a>
                </div>

                <div class="form-actions-login">
                    <div class="remember-me">
                        <input type="checkbox" id="remember" checked>
                        <label for="remember">Ghi nhớ đăng nhập</label>
                    </div>
                    <a href="Home.html" type="submit" class="btn-submit">Đăng nhập</a>
                </div>
                
            </form>
        </div>
    </main>

</body>
</html>
